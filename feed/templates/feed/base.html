<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CodeAlpha Social Media Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">CodeAlpha Social</a>
            <div class="d-flex align-items-center gap-2 text-white">
                {% if request.user.is_authenticated %}
                    <a class="btn btn-sm btn-outline-light" href="{% url 'profile' request.user.username %}">@{{ request.user.username }}</a>
                    <a class="btn btn-sm btn-warning" href="{% url 'edit_profile' %}">Edit profile</a>
                    <a class="btn btn-sm btn-danger" href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a class="btn btn-sm btn-outline-light" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-sm btn-warning" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
